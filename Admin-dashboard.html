<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles/admin-dashboard.css" />
  </head>
  <body>
    <nav class="navbar">
      <h1>Admin Dashboard</h1>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Manage Clubs</a></li>
        <li><a href="#">Manage Events</a></li>
        <li><a href="#">Manage Tournaments</a></li>
        <li><a href="admin-login.html">Logout</a></li>
      </ul>
    </nav>

    <div class="container">
      <h2>Manage Club Approvals</h2>
      <button onclick="addClub()">Add New Club</button>
      <div id="club-approval-section"></div>
    </div>

    <div class="container">
      <h2>Manage Clubs</h2>
      <div class="button-container">
        <div onclick="viewAllClubs()"></div>
      </div>
      <div id="club-section"></div>

      <h2>Manage Events</h2>
      <div class="button-container">
        <button onclick="addEvent()">Add New Event</button>
      </div>
      <div id="event-section"></div>

      <h2>Manage Tournaments</h2>
      <div class="button-container">
        <button onclick="addTournament()">Add New Tournament</button>
      </div>
      <div id="tournament-section"></div>
    </div>

    <script src="js/admin-dashboard.js"></script>
  </body>
</html>
